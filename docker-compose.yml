# ═══════════════════════════════════════════════════════════════════
# MICROHARD AGENCY — LOCAL PLATFORM
# v1 Stack: Plane (project management) + Invoice Ninja (invoicing)
#
# Plane:         http://localhost:33000
# Invoice Ninja: http://localhost:38080
# MinIO Console: http://localhost:39090  (file storage admin — optional)
# ═══════════════════════════════════════════════════════════════════

networks:
  agency-net:
    driver: bridge


# ─────────────────────────────────────────────────────────────────
# SHARED ENV — applied to all Plane backend services
# ─────────────────────────────────────────────────────────────────
x-plane-env: &plane-env
  SECRET_KEY: ${PLANE_SECRET_KEY}
  DJANGO_SETTINGS_MODULE: plane.settings.production
  DATABASE_URL: postgresql://${PLANE_DB_USER}:${PLANE_DB_PASSWORD}@plane-db:5432/${PLANE_DB_NAME}
  REDIS_URL: redis://plane-redis:6379/
  USE_MINIO: "1"
  AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
  AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
  AWS_S3_ENDPOINT_URL: http://plane-minio:9000
  AWS_S3_BUCKET_NAME: uploads
  BUCKET_NAME: uploads
  WEB_URL: ${WEB_URL:-http://localhost:33000}
  CORS_ALLOWED_ORIGINS: ${WEB_URL:-http://localhost:33000}
  AMQP_URL: redis://plane-redis:6379/
  GUNICORN_WORKERS: "2"
  APP_BASE_URL: ${WEB_URL:-http://localhost:33000}
  SPACE_BASE_URL: ${WEB_URL:-http://localhost:33000}
  ENABLE_SIGNUP: "1"
  EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
  CELERY_BROKER_CONN_RETRY_ON_STARTUP: "1"

services:

# ─────────────────────────────────────────────────────────────────
# PLANE — Project Management
# ─────────────────────────────────────────────────────────────────

  # Nginx proxy: routes /api/ and /auth/ to backend, everything else to frontend
  plane-proxy:
    image: nginx:1.25-alpine
    container_name: plane-proxy
    restart: unless-stopped
    ports:
      - "33000:80"
    volumes:
      - ./configs/plane/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - plane-web
      - plane-admin
      - plane-api
    networks:
      - agency-net

  # Frontend: static SPA served by nginx on port 3000
  plane-web:
    image: makeplane/plane-frontend:stable
    container_name: plane-web
    restart: unless-stopped
    networks:
      - agency-net

  # Admin panel: god-mode instance settings, served at /god-mode
  plane-admin:
    image: makeplane/plane-admin:stable
    container_name: plane-admin
    restart: unless-stopped
    networks:
      - agency-net

  # Migrator: runs Django migrations, exits when done
  plane-migrator:
    image: makeplane/plane-backend:stable
    container_name: plane-migrator
    command: ./bin/docker-entrypoint-migrator.sh
    restart: "no"
    environment:
      <<: *plane-env
    depends_on:
      plane-db:
        condition: service_healthy
    networks:
      - agency-net

  # API: waits for migrations via wait_for_migrations management command
  plane-api:
    image: makeplane/plane-backend:stable
    container_name: plane-api
    command: ./bin/docker-entrypoint-api.sh
    restart: unless-stopped
    environment:
      <<: *plane-env
    depends_on:
      plane-db:
        condition: service_healthy
      plane-redis:
        condition: service_started
      plane-minio:
        condition: service_started
    networks:
      - agency-net

  # Worker: async task processor (waits for migrations automatically)
  plane-worker:
    image: makeplane/plane-backend:stable
    container_name: plane-worker
    command: ./bin/docker-entrypoint-worker.sh
    restart: unless-stopped
    environment:
      <<: *plane-env
    depends_on:
      - plane-api
    networks:
      - agency-net

  # Beat: Celery scheduler for recurring jobs (waits for migrations automatically)
  plane-beat:
    image: makeplane/plane-backend:stable
    container_name: plane-beat
    command: ./bin/docker-entrypoint-beat.sh
    restart: unless-stopped
    environment:
      <<: *plane-env
    depends_on:
      - plane-api
    networks:
      - agency-net

  plane-db:
    image: postgres:15-alpine
    container_name: plane-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PLANE_DB_USER}
      POSTGRES_PASSWORD: ${PLANE_DB_PASSWORD}
      POSTGRES_DB: ${PLANE_DB_NAME}
    volumes:
      - ./data/plane-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PLANE_DB_USER} -d ${PLANE_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agency-net

  plane-redis:
    image: redis:7-alpine
    container_name: plane-redis
    restart: unless-stopped
    volumes:
      - ./data/plane-redis:/data
    networks:
      - agency-net

  plane-minio:
    image: minio/minio:latest
    container_name: plane-minio
    restart: unless-stopped
    command: server /data --console-address ":9090"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./data/plane-minio:/data
    ports:
      - "39090:9090"
    networks:
      - agency-net

# ─────────────────────────────────────────────────────────────────
# INVOICE NINJA — Invoicing & Finance
# Access: http://localhost:38080
# Architecture: nginx (web) → php-fpm (app) + mysql (db)
# ─────────────────────────────────────────────────────────────────

  # Nginx web server for Invoice Ninja (serves static files + proxies PHP to fpm)
  invoice-ninja-nginx:
    image: nginx:1.25-alpine
    container_name: invoice-ninja-nginx
    restart: unless-stopped
    ports:
      - "38080:80"
    volumes:
      - ./configs/invoice-ninja/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/invoice-ninja/public:/var/www/app/public:ro
    depends_on:
      - invoice-ninja
    networks:
      - agency-net

  # PHP-FPM application container
  invoice-ninja:
    image: invoiceninja/invoiceninja:5
    container_name: invoice-ninja
    restart: unless-stopped
    environment:
      - APP_URL=http://localhost:38080
      - APP_KEY=${IN_APP_KEY}
      - DB_HOST=invoice-ninja-db
      - DB_DATABASE=${IN_DB_NAME}
      - DB_USERNAME=${IN_DB_USER}
      - DB_PASSWORD=${IN_DB_PASSWORD}
      - REQUIRE_HTTPS=false
      - PHANTOMJS_PDF_GENERATION=false
      - PDF_GENERATOR=snappdf
      - TRUSTED_PROXIES=*
      - QUEUE_CONNECTION=database
    volumes:
      - ./data/invoice-ninja/public:/var/www/app/public
      - ./data/invoice-ninja/storage:/var/www/app/storage
    depends_on:
      invoice-ninja-db:
        condition: service_healthy
    networks:
      - agency-net

  invoice-ninja-db:
    image: mysql:8.0
    container_name: invoice-ninja-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${IN_DB_NAME}
      MYSQL_USER: ${IN_DB_USER}
      MYSQL_PASSWORD: ${IN_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${IN_DB_ROOT_PASSWORD}
    volumes:
      - ./data/invoice-ninja-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${IN_DB_USER}", "-p${IN_DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agency-net
