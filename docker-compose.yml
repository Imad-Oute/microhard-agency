version: '3.8'

# ═══════════════════════════════════════════════════════════════════
# MICROHARD AGENCY — LOCAL PLATFORM
# v1 Stack: Plane (project management) + Invoice Ninja (invoicing)
#
# Plane:         http://localhost:33000
# Invoice Ninja: http://localhost:38080
# MinIO Console: http://localhost:39090  (file storage admin — optional)
# ═══════════════════════════════════════════════════════════════════

networks:
  agency-net:
    driver: bridge

volumes:
  plane-db-data:
  plane-redis-data:
  plane-minio-data:
  invoice-ninja-public:
  invoice-ninja-storage:
  invoice-ninja-db-data:

# ─────────────────────────────────────────────────────────────────
# SHARED ENV — applied to all Plane backend services
# ─────────────────────────────────────────────────────────────────
x-plane-env: &plane-env
  SECRET_KEY: ${PLANE_SECRET_KEY}
  DJANGO_SETTINGS_MODULE: plane.settings.production
  DATABASE_URL: postgresql://${PLANE_DB_USER}:${PLANE_DB_PASSWORD}@plane-db:5432/${PLANE_DB_NAME}
  REDIS_URL: redis://plane-redis:6379/
  USE_MINIO: "1"
  AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
  AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
  AWS_S3_ENDPOINT_URL: http://plane-minio:9000
  AWS_S3_BUCKET_NAME: uploads
  BUCKET_NAME: uploads
  WEB_URL: ${WEB_URL:-http://localhost:33000}
  CORS_ALLOWED_ORIGINS: ${WEB_URL:-http://localhost:33000}
  ENABLE_SIGNUP: "1"
  EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend

services:

# ─────────────────────────────────────────────────────────────────
# PLANE — Project Management
# Proxy (nginx) → Frontend (Next.js) + Backend (Django)
# ─────────────────────────────────────────────────────────────────

  plane-proxy:
    image: nginx:1.25-alpine
    container_name: plane-proxy
    restart: unless-stopped
    ports:
      - "33000:80"
    volumes:
      - ./configs/plane/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - plane-web
      - plane-api
    networks:
      - agency-net

  plane-web:
    image: makeplane/plane-frontend:stable
    container_name: plane-web
    restart: unless-stopped
    command: /usr/local/bin/start.sh apps/app/server.js app
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${WEB_URL:-http://localhost:33000}
    depends_on:
      - plane-api
    networks:
      - agency-net

  plane-api:
    image: makeplane/plane-backend:stable
    container_name: plane-api
    restart: unless-stopped
    command: ./bin/takeoff
    environment:
      <<: *plane-env
    depends_on:
      plane-db:
        condition: service_healthy
      plane-redis:
        condition: service_started
    networks:
      - agency-net

  plane-worker:
    image: makeplane/plane-backend:stable
    container_name: plane-worker
    restart: unless-stopped
    command: ./bin/worker
    environment:
      <<: *plane-env
    depends_on:
      - plane-api
    networks:
      - agency-net

  plane-beat:
    image: makeplane/plane-backend:stable
    container_name: plane-beat
    restart: unless-stopped
    command: ./bin/beat
    environment:
      <<: *plane-env
    depends_on:
      - plane-api
    networks:
      - agency-net

  plane-migrator:
    image: makeplane/plane-backend:stable
    container_name: plane-migrator
    command: ./bin/migrate
    restart: "no"
    environment:
      <<: *plane-env
    depends_on:
      plane-db:
        condition: service_healthy
    networks:
      - agency-net

  plane-db:
    image: postgres:15-alpine
    container_name: plane-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PLANE_DB_USER}
      POSTGRES_PASSWORD: ${PLANE_DB_PASSWORD}
      POSTGRES_DB: ${PLANE_DB_NAME}
    volumes:
      - plane-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PLANE_DB_USER} -d ${PLANE_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agency-net

  plane-redis:
    image: redis:7-alpine
    container_name: plane-redis
    restart: unless-stopped
    volumes:
      - plane-redis-data:/data
    networks:
      - agency-net

  plane-minio:
    image: minio/minio:latest
    container_name: plane-minio
    restart: unless-stopped
    command: server /data --console-address ":9090"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - plane-minio-data:/data
    ports:
      - "39090:9090"   # MinIO console (admin UI — optional)
    networks:
      - agency-net

  plane-minio-setup:
    image: minio/mc:latest
    container_name: plane-minio-setup
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://plane-minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb myminio/uploads --ignore-existing;
      /usr/bin/mc anonymous set download myminio/uploads;
      exit 0;
      "
    depends_on:
      - plane-minio
    networks:
      - agency-net

# ─────────────────────────────────────────────────────────────────
# INVOICE NINJA — Invoicing & Finance
# Access: http://localhost:8080
# ─────────────────────────────────────────────────────────────────

  invoice-ninja:
    image: invoiceninja/invoiceninja:5
    container_name: invoice-ninja
    restart: unless-stopped
    ports:
      - "38080:80"
    environment:
      - APP_URL=http://localhost:38080
      - APP_KEY=${IN_APP_KEY}
      - DB_HOST=invoice-ninja-db
      - DB_DATABASE=${IN_DB_NAME}
      - DB_USERNAME=${IN_DB_USER}
      - DB_PASSWORD=${IN_DB_PASSWORD}
      - REQUIRE_HTTPS=false
      - PHANTOMJS_PDF_GENERATION=false
      - PDF_GENERATOR=snappdf
      - TRUSTED_PROXIES=*
      - QUEUE_CONNECTION=database
    volumes:
      - invoice-ninja-public:/var/www/app/public
      - invoice-ninja-storage:/var/www/app/storage
    depends_on:
      invoice-ninja-db:
        condition: service_healthy
    networks:
      - agency-net

  invoice-ninja-db:
    image: mysql:8.0
    container_name: invoice-ninja-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${IN_DB_NAME}
      MYSQL_USER: ${IN_DB_USER}
      MYSQL_PASSWORD: ${IN_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${IN_DB_ROOT_PASSWORD}
    volumes:
      - invoice-ninja-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${IN_DB_USER}", "-p${IN_DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agency-net
