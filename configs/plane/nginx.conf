events {
    worker_connections 1024;
}

http {
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    upstream plane-app {
        server plane-web:3000;
    }

    upstream plane-backend {
        server plane-api:8000;
    }

    upstream plane-storage {
        server plane-minio:9000;
    }

    server {
        listen 80;
        server_name _;

        # ── API ────────────────────────────────────────────────────
        location /api/ {
            proxy_pass          http://plane-backend;
            proxy_http_version  1.1;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_read_timeout  300s;
        }

        # ── Auth ───────────────────────────────────────────────────
        location /auth/ {
            proxy_pass          http://plane-backend;
            proxy_http_version  1.1;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
        }

        # ── File uploads (MinIO) ──────────────────────────────────
        location /uploads/ {
            proxy_pass          http://plane-storage/uploads/;
            proxy_http_version  1.1;
            proxy_set_header    Host              $http_host;
            proxy_set_header    X-Real-IP         $remote_addr;
        }

        # ── Frontend ───────────────────────────────────────────────
        location / {
            proxy_pass          http://plane-app;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade           $http_upgrade;
            proxy_set_header    Connection        "upgrade";
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
        }
    }
}
