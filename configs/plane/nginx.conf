events {
    worker_connections 1024;
}

http {
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    # Use Docker's embedded DNS so upstream hostnames re-resolve after restarts
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;

        # ── API ────────────────────────────────────────────────────
        location /api/ {
            set $upstream_api plane-api:8000;
            proxy_pass          http://$upstream_api;
            proxy_http_version  1.1;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_read_timeout  300s;
        }

        # ── Auth ───────────────────────────────────────────────────
        location /auth/ {
            set $upstream_api plane-api:8000;
            proxy_pass          http://$upstream_api;
            proxy_http_version  1.1;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
        }

        # ── File uploads (MinIO) ──────────────────────────────────
        # No trailing slash: presigned POST targets /uploads (bucket root)
        # proxy_pass without path: passes full URI to MinIO unchanged
        location /uploads {
            set $upstream_minio plane-minio:9000;
            proxy_pass          http://$upstream_minio;
            proxy_http_version  1.1;
            proxy_set_header    Host              $http_host;
            proxy_set_header    X-Real-IP         $remote_addr;
        }

        # ── Frontend ───────────────────────────────────────────────
        location / {
            set $upstream_web plane-web:3000;
            proxy_pass          http://$upstream_web;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade           $http_upgrade;
            proxy_set_header    Connection        "upgrade";
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
        }
    }
}
